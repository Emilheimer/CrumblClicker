<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crumbl Clicker - Scroll Fix</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
            background: #1e1e1e; 
            color: white; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        /* --- DESKTOP --- */
        #left { width: 40%; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); border-right: 2px solid rgba(255,255,255,0.1); z-index: 10; }
        #middle, #right { width: 30%; padding: 20px; overflow-y: auto; background: rgba(0,0,0,0.5); }
        #middle { border-right: 2px solid rgba(255,255,255,0.1); }

        /* --- MOBILE (ULTIMATE SCROLL FIX) --- */
        @media (max-width: 800px) {
            body { 
                display: block; 
                overflow-x: hidden;
                overflow-y: auto; /* Gesamte Seite scrollbar */
                height: 100%;
            }

            #left { 
                width: 100% !important; 
                height: 300px !important; /* Feste Höhe für den Keks-Teil */
                position: fixed; /* Bleibt IMMER oben am Bildschirm */
                top: 0; 
                left: 0;
                z-index: 100; /* Ganz vorne */
                background: #2c1f16;
                box-shadow: 0 5px 20px rgba(0,0,0,0.8);
                border: none;
                justify-content: center;
                padding: 0;
            }

            #middle { 
                margin-top: 300px; /* Platzhalter, damit der Shop unter dem Keks startet */
                width: 100% !important; 
                min-height: auto;
                overflow-y: visible; 
                position: relative;
                z-index: 10;
                background: #251a12;
                border: none;
            }

            #right {
                width: 100% !important;
                min-height: 400px;
                overflow-y: visible;
                position: relative;
                z-index: 10;
                background: #1e150f;
                border: none;
                padding-bottom: 50px;
            }

            #cookie { width: 140px !important; }
            h1 { font-size: 1.2rem; margin: 5px; }
            h2 { margin-top: 10px; }
        }

        #cookie { width: 220px; cursor: pointer; transition: transform 0.05s; filter: drop-shadow(0 0 15px rgba(0,0,0,0.5)); }
        .klick-anim { transform: scale(0.92) rotate(-3deg); }

        .shopItem { background: rgba(60, 60, 60, 0.8); padding: 12px; margin: 10px 0; border-radius: 12px; display: flex; align-items: center; border: 1px solid #444; }
        .shopEmoji { font-size: 2.2em; margin-right: 15px; width: 45px; text-align: center; }
        
        .achItem { background: rgba(30, 30, 30, 0.9); padding: 8px; margin: 5px 0; border-radius: 6px; opacity: 0.2; filter: grayscale(1); transition: 0.5s; border: 1px solid #222; }
        .achItem.unlocked { opacity: 1; filter: grayscale(0); border-color: #f1c40f; background: rgba(241, 196, 15, 0.1); }

        button { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; background: #e67e22; color: white; font-weight: bold; }
        .btn-off { background: #7f8c8d; }
        .btn-on { background: #27ae60; }

        #achievementPopup { position: fixed; top: -120px; left: 50%; transform: translateX(-50%); background: #f1c40f; color: black; padding: 15px 25px; border-radius: 0 0 15px 15px; font-weight: bold; z-index: 1000; transition: 0.5s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); width: 80%; text-align: center; }
        .partikel { position: fixed; color: #f1c40f; font-weight: bold; pointer-events: none; animation: fly 0.8s forwards; text-shadow: 1px 1px 3px black; font-size: 1.5em; z-index: 2000; }
        @keyframes fly { 0% {opacity:1; transform:translateY(0);} 100% {opacity:0; transform:translateY(-120px);} }
    </style>
</head>
<body>

<div id="achievementPopup">🏆 Achievement!</div>

<div id="left">
    <h1>🍪 Crumbl Clicker</h1>
    <h2 id="cookieCountDisplay" style="font-size: 2.8em; margin: 2px 0;">0</h2>
    <p style="margin: 5px;">Klick: <span id="cpcDisplay">1</span> | ⚡ CPS: <span id="cpsDisplay">0</span></p>
    <img id="cookie" src="cookie.png" onmousedown="handleFirstClick(event)" ontouchstart="handleFirstClick(event)">
</div>

<div id="middle">
    <h2>🏪 Shop</h2>
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button id="offlineBtn" onclick="toggleOfflineMode()" class="btn-off" style="flex: 1;">💤 Offline: AUS</button>
        <button onclick="resetGame()" style="background: #c0392b;">🔄 Reset</button>
    </div>
    <div id="shopContainer"></div>
</div>

<div id="right">
    <h2>🏆 Erfolge (<span id="achCount">0</span>/75)</h2>
    <div id="achContainer"></div>
</div>

<script>
let clickSound = new Audio("click.mp3");
let achSound = new Audio("achieve.mp3");
let audioInitialized = false;

function handleFirstClick(e) {
    if (!audioInitialized) {
        clickSound.play().then(() => {
            clickSound.pause(); clickSound.currentTime = 0;
            achSound.play().then(() => {
                achSound.pause(); achSound.currentTime = 0;
                audioInitialized = true;
            });
        }).catch(() => {});
    }
    cookieKlick(e);
}

let cookies = 0;
let totalCookiesEver = 0;
let totalClicks = 0;
let cpcBase = 1;
let multiplier = 1;
let unlockedAchs = new Set();
let offlineModeActive = false;

const shop = {
    cursorUpgrade: {name: "Klick-Training", kosten: 50, cps: 0, anzahl: 0, emoji: "💪"},
    cursor: {name: "Cursor", kosten: 15, cps: 0.8, anzahl: 0, emoji: "🖱️"},
    grandma: {name: "Oma", kosten: 100, cps: 4, anzahl: 0, emoji: "👵"},
    farm: {name: "Farm", kosten: 1100, cps: 15, anzahl: 0, emoji: "🚜"},
    mine: {name: "Mine", kosten: 12000, cps: 60, anzahl: 0, emoji: "⛏️"},
    factory: {name: "Fabrik", kosten: 130000, cps: 300, anzahl: 0, emoji: "🏭"},
    bank: {name: "Bank", kosten: 1400000, cps: 1600, anzahl: 0, emoji: "🏦"},
    temple: {name: "Tempel", kosten: 20000000, cps: 8500, anzahl: 0, emoji: "🛕"},
    ship: {name: "Raumschiff", kosten: 330000000, cps: 50000, anzahl: 0, emoji: "🚀"},
    timeMachine: {name: "Zeitmaschine", kosten: 5100000000, cps: 250000, anzahl: 0, emoji: "⏳"},
    portal: {name: "Keks-Portal", kosten: 75000000000, cps: 1500000, anzahl: 0, emoji: "🌀"},
    reactor: {name: "Keks-Reaktor", kosten: 900000000000, cps: 10000000, anzahl: 0, emoji: "☢️"},
    god: {name: "Keks-Gott", kosten: 15000000000000, cps: 80000000, anzahl: 0, emoji: "✨"}
};

const achievements = [];
function createAchievements() {
    const cT = [1, 100, 1000, 10000, 100000, 1000000, 10000000, 100000000];
    cT.forEach((t, i) => achievements.push({id: i+1, name: "Sammler "+(i+1), desc: t.toLocaleString()+" Kekse", cond: () => totalCookiesEver >= t}));
    Object.keys(shop).forEach((key, i) => {
        achievements.push({id: 20+i, name: shop[key].name+" Fan", desc: "Besitze 10 "+shop[key].name, cond: () => shop[key].anzahl >= 10});
    });
}
createAchievements();

function init() {
    const shopCont = document.getElementById("shopContainer");
    for(let key in shop) {
        let item = shop[key];
        shopCont.innerHTML += `<div class="shopItem">
            <span class="shopEmoji">${item.emoji}</span>
            <div style="flex-grow:1"><strong>${item.name}</strong><br><span id="${key}Price">${item.kosten.toLocaleString()}</span></div>
            <div><button onclick="kaufen('${key}')">Kaufen</button></div><div style="margin-left:10px" id="${key}Anz">0</div></div>`;
    }
    const achCont = document.getElementById("achContainer");
    achievements.forEach(a => { achCont.innerHTML += `<div id="ach-${a.id}" class="achItem"><strong>${a.name}</strong><br>${a.desc}</div>`; });
    
    load(); 
    unlockedAchs.forEach(id => {
        const el = document.getElementById("ach-" + id);
        if(el) el.classList.add("unlocked");
    });
    updateUI();
}

function toggleOfflineMode() {
    offlineModeActive = !offlineModeActive;
    updateUI();
    save();
}

function cookieKlick(e) {
    if(e && e.type === 'touchstart') e.preventDefault(); 
    let power = cpcBase * multiplier;
    cookies += power; totalCookiesEver += power; totalClicks++;
    clickSound.currentTime = 0; clickSound.play().catch(()=>{});
    const cookieEl = document.getElementById("cookie");
    cookieEl.classList.add("klick-anim");
    setTimeout(()=>cookieEl.classList.remove("klick-anim"), 50);
    let x = (e.touches) ? e.touches[0].clientX : e.clientX;
    let y = (e.touches) ? e.touches[0].clientY : e.clientY;
    spawnPartikel(x, y, "+" + power);
    updateUI();
}

function kaufen(key) {
    let item = shop[key];
    if(cookies >= item.kosten) {
        cookies -= item.kosten; item.anzahl++;
        item.kosten *= (key === "cursorUpgrade" ? 2.3 : 1.15);
        if(key === "cursorUpgrade") cpcBase++;
        updateUI();
    }
}

function getCps() { return Object.values(shop).reduce((a, b) => a + (b.anzahl * b.cps), 0); }

function updateUI() {
    document.getElementById("cookieCountDisplay").innerText = Math.floor(cookies).toLocaleString();
    document.getElementById("cpcDisplay").innerText = (cpcBase * multiplier).toLocaleString();
    document.getElementById("cpsDisplay").innerText = Math.floor(getCps()).toLocaleString();
    document.getElementById("achCount").innerText = unlockedAchs.size;
    const offBtn = document.getElementById("offlineBtn");
    if(offBtn) {
        offBtn.innerText = offlineModeActive ? "💤 Offline: AN" : "💤 Offline: AUS";
        offBtn.className = offlineModeActive ? "btn-on" : "btn-off";
    }
    for(let key in shop) {
        document.getElementById(key + "Anz").innerText = shop[key].anzahl;
        document.getElementById(key + "Price").innerText = Math.floor(shop[key].kosten).toLocaleString();
    }
}

function spawnPartikel(x, y, txt) {
    let p = document.createElement("div"); p.className = "partikel"; p.innerText = txt;
    p.style.left = x + "px"; p.style.top = y + "px";
    document.body.appendChild(p); setTimeout(()=>p.remove(), 800);
}

function checkAchs() {
    achievements.forEach(a => {
        if(!unlockedAchs.has(a.id) && a.cond()) {
            unlockedAchs.add(a.id);
            const el = document.getElementById("ach-" + a.id);
            if(el) el.classList.add("unlocked");
            showPopup("🏆 Achievement: " + a.name);
        }
    });
}

function showPopup(txt) {
    let pop = document.getElementById("achievementPopup");
    pop.innerText = txt; pop.style.top = "0px";
    if (audioInitialized) achSound.play().catch(()=>{});
    setTimeout(() => pop.style.top = "-120px", 4000);
}

function resetGame() { if(confirm("Spielstand wirklich löschen?")) { localStorage.clear(); location.reload(); } }

setInterval(() => {
    let gain = getCps() / 30; cookies += gain; totalCookiesEver += gain;
    checkAchs(); updateUI();
}, 1000/30);

function save() { 
    localStorage.setItem("cookie_Save_UltimateScroll", JSON.stringify({
        cookies, totalCookiesEver, totalClicks, cpcBase, offlineModeActive,
        lastSaveTime: Date.now(),
        shopAnzahlen: Object.keys(shop).map(k => ({k, a: shop[k].anzahl, p: shop[k].kosten})),
        unlockedAchs: Array.from(unlockedAchs)
    })); 
}

function load() {
    let raw = localStorage.getItem("cookie_Save_UltimateScroll");
    if(!raw) return;
    let d = JSON.parse(raw);
    cookies = d.cookies || 0; totalCookiesEver = d.totalCookiesEver || 0;
    totalClicks = d.totalClicks || 0; cpcBase = d.cpcBase || 1;
    offlineModeActive = d.offlineModeActive || false;
    unlockedAchs = new Set(d.unlockedAchs || []);
    if(d.shopAnzahlen) d.shopAnzahlen.forEach(item => {
        if(shop[item.k]) { shop[item.k].anzahl = item.a; shop[item.k].kosten = item.p; }
    });

    if(offlineModeActive && d.lastSaveTime) {
        let diffSec = Math.floor((Date.now() - d.lastSaveTime) / 1000);
        if(diffSec > 10) { 
            let idleGain = diffSec * (getCps() / 2);
            let maxGain = diffSec * (10000 / 3600);
            if(idleGain > maxGain) idleGain = maxGain;
            if(idleGain > 0) {
                cookies += idleGain; totalCookiesEver += idleGain;
                setTimeout(() => showPopup(`💤 +${Math.floor(idleGain).toLocaleString()} Kekse`), 1500);
            }
        }
    }
}
setInterval(save, 5000);
init();
</script>
</body>
</html>
