<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crumbl Clicker: Legendär</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        :root { --primary: #f1c40f; --bg: #0f0f0f; --panel: #1a1a1a; --text: #ffffff; --accent: #3498db; --gold: #ffd700; --danger: #e74c3c; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        
        /* Hintergrund-Regen */
        #rain-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .rain-cookie { position: absolute; top: -50px; font-size: 24px; opacity: 0.15; animation: fall linear forwards; }
        
        /* Klick-Zahlen Popups */
        .click-popup { position: fixed; color: var(--primary); font-weight: bold; font-size: 1.6rem; pointer-events: none; z-index: 1000; animation: floatUp 0.8s ease-out forwards; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        @keyframes fall { 0% { transform: translateY(-50px) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-120px) scale(1.2); opacity: 0; } }

        header { background: var(--panel); padding: 10px; text-align: center; border-bottom: 2px solid #333; z-index: 100; }
        #cookieCountDisplay { font-size: 2.2em; font-weight: bold; color: var(--primary); }
        
        #main-content { flex-grow: 1; overflow-y: auto; position: relative; z-index: 10; padding-bottom: 80px; }
        .view { display: none; padding: 15px; }
        .view.active { display: block; }

        #view-keks { flex-direction: column; align-items: center; justify-content: center; height: 80%; }
        #view-keks.active { display: flex; }
        #cookie { width: 50vw; max-width: 180px; cursor: pointer; transition: transform 0.05s; z-index: 20; position: relative; }
        .klick-anim { transform: scale(0.92); }

        .category-title { border-left: 4px solid var(--primary); padding-left: 10px; margin: 25px 0 10px 0; color: var(--primary); font-weight: bold; font-size: 0.9rem; text-transform: uppercase; }
        .shopItem { background: #1e1e1e; padding: 12px; margin: 8px 0; border-radius: 12px; display: flex; align-items: center; border: 1px solid #333; }
        .item-info { flex-grow: 1; margin-left: 12px; }
        .item-info b { display: block; font-size: 0.9rem; }
        .item-info span { color: var(--primary); font-size: 0.8rem; }
        
        button.buy-btn { background: #e67e22; border: none; color: white; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.3; filter: grayscale(1); }

        .achievement-card { opacity: 0.2; transition: 0.3s; filter: grayscale(1); border: 1px solid #333; }
        .achievement-card.unlocked { opacity: 1; border-color: var(--gold); background: rgba(255, 215, 0, 0.1); filter: grayscale(0); }

        .leader-card { background: #1e1e1e; padding: 12px; margin-bottom: 8px; border-radius: 12px; display: flex; align-items: center; border: 1px solid #333; }
        .rank-badge { width: 35px; font-weight: bold; color: var(--primary); font-size: 1.1rem; }

        nav { height: 70px; background: var(--panel); display: flex; border-top: 1px solid #333; position: fixed; bottom: 0; width: 100%; z-index: 200; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 0.65rem; cursor: pointer; }
        .nav-btn.active { color: var(--primary); }

        #offlineModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="rain-container"></div>

<div id="offlineModal">
    <div style="background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; border: 2px solid var(--primary); max-width: 80%;">
        <h2 style="color: var(--primary); margin-top: 0;">Willkommen zurück!</h2>
        <p>Deine Helfer waren fleißig (10% Rate):</p>
        <div style="font-size: 2.2rem; color: var(--gold); margin: 20px 0; font-weight: bold;">+ <span id="offlineGainDisplay">0</span> 🍪</div>
        <button onclick="document.getElementById('offlineModal').style.display='none'" style="width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 10px; font-weight: bold; color: black; font-size: 1rem;">Einsammeln!</button>
    </div>
</div>

<header>
    <div id="cookieCountDisplay">0</div>
    <div style="font-size: 0.8rem; color: #888;">CPS: <span id="cpsDisplay">0</span> | Erfolge: <span id="achCountDisplay">0</span>/100</div>
</header>

<div id="main-content">
    <div id="view-keks" class="view active">
        <img id="cookie" src="cookie.png">
        <div id="name-display-main" style="margin-top:15px; font-weight:bold; color:var(--primary)">Gast</div>
    </div>
    
    <div id="view-shop" class="view">
        <div class="category-title">Gebäude</div>
        <div id="buildingsContainer"></div>
        <div class="category-title">Spezial-Forschung</div>
        <div id="specialsContainer"></div>
    </div>

    <div id="view-achievements" class="view">
        <h2 style="text-align:center">Ehrungen</h2>
        <div id="achievementsContainer"></div>
    </div>

    <div id="view-leaderboard" class="view">
        <h2 style="text-align:center">Globale Bestenliste</h2>
        <div id="leaderboardContainer">Suche Bäcker...</div>
    </div>

    <div id="view-profile" class="view">
        <div id="auth-section">
            <input type="text" id="usernameInput" placeholder="Dein Name" style="width:100%; padding:10px; margin-bottom:5px; background:#222; color:white; border:1px solid #444;">
            <input type="email" id="emailInput" placeholder="E-Mail" style="width:100%; padding:10px; margin-bottom:5px; background:#222; color:white; border:1px solid #444;">
            <input type="password" id="passwordInput" placeholder="Passwort" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:white; border:1px solid #444;">
            <button id="auth-btn" style="width:100%; padding:12px; background:var(--primary); border:none; border-radius:8px; font-weight:bold;">Account nutzen</button>
        </div>
        <div id="user-info" style="display:none; text-align:center;">
            <h2 id="display-name">Spieler</h2>
            <div style="background:#222; padding:15px; border-radius:10px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
                <span>Offline-Produktion (10%)</span>
                <input type="checkbox" id="offlineToggle" checked style="width:20px; height:20px;">
            </div>
            <button id="logout-btn" style="width:100%; padding:10px; background:#444; color:white; border:none; border-radius:8px; margin-bottom:10px;">Ausloggen</button>
            <button id="reset-btn" style="width:100%; padding:10px; background:var(--danger); color:white; border:none; border-radius:8px; font-weight:bold;">Alles löschen</button>
        </div>
    </div>
</div>

<nav>
    <div class="nav-btn active" data-view="view-keks">🍪<br>Keks</div>
    <div class="nav-btn" data-view="view-shop">🏪<br>Shop</div>
    <div class="nav-btn" data-view="view-achievements">🏆<br>Erfolge</div>
    <div class="nav-btn" data-view="view-leaderboard">📊<br>Ranking</div>
    <div class="nav-btn" data-view="view-profile">👤<br>Profil</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBw_qDPQsWU1sl5KVE-74WCHsqPI0HmxN8",
        authDomain: "crumblclicker.firebaseapp.com",
        projectId: "crumblclicker",
        storageBucket: "crumblclicker.firebasestorage.app",
        messagingSenderId: "912766884531",
        appId: "1:912766884531:web:ac49743ae7d2684f12aec6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let cookies = 0; let totalEver = 0; let multiplier = 1; let offlineActive = true;
    let currentUser = null; let unlockedAchs = [];

    const clickSound = new Audio('click.mp3');
    const achSound = new Audio('achieve.mp3');
    function playSnd(s) { s.currentTime = 0; s.play().catch(()=>{}); }

    const buildings = {
        click: { name: "Klick-Muskeln", kosten: 50, base: 50, cpc: 1, anzahl: 0, emoji: "💪" },
        cursor: { name: "Auto-Finger", kosten: 15, base: 15, cps: 0.5, anzahl: 0, emoji: "🖱️" },
        oma: { name: "Oma-Armee", kosten: 100, base: 100, cps: 4, anzahl: 0, emoji: "👵" },
        farm: { name: "Keks-Plantage", kosten: 1100, base: 1100, cps: 15, anzahl: 0, emoji: "🚜" },
        mine: { name: "Schoko-Mine", kosten: 12000, base: 12000, cps: 50, anzahl: 0, emoji: "⛏️" },
        fabrik: { name: "Teig-Fabrik", kosten: 130000, base: 130000, cps: 260, anzahl: 0, emoji: "🏭" },
        bank: { name: "Keks-Börse", kosten: 1400000, base: 1400000, cps: 1400, anzahl: 0, emoji: "🏦" },
        tempel: { name: "Kult-Altar", kosten: 20000000, base: 20000000, cps: 7800, anzahl: 0, emoji: "🕍" },
        wizard: { name: "Zauberturm", kosten: 330000000, base: 330000000, cps: 44000, anzahl: 0, emoji: "🧙" },
        portal: { name: "Wurmloch", kosten: 5000000000, base: 5000000000, cps: 250000, anzahl: 0, emoji: "🌀" },
        zeit: { name: "Delorean", kosten: 75000000000, base: 75000000000, cps: 1600000, anzahl: 0, emoji: "⏳" },
        gott: { name: "Keks-Gott", kosten: 999999999999, base: 999999999999, cps: 10000000, anzahl: 0, emoji: "✨" }
    };

    const specials = {
        s1: { name: "Glücks-Hefe", kosten: 5000, mult: 0.2, emoji: "🍀" },
        s2: { name: "Zuckerschock", kosten: 25000, mult: 0.3, emoji: "🧁" },
        s3: { name: "Doppel-Füllung", kosten: 100000, mult: 0.5, emoji: "🥛" },
        s4: { name: "Turbo-Ofen", kosten: 500000, mult: 1.0, emoji: "🔥" },
        s5: { name: "Nanoroboter", kosten: 2000000, mult: 1.5, emoji: "🍫" },
        s6: { name: "Goldene Walze", kosten: 10000000, mult: 2.0, emoji: "🥖" },
        s7: { name: "Meister-Rezept", kosten: 50000000, mult: 2.5, emoji: "👨‍🍳" },
        s8: { name: "Keks-Cloud", kosten: 250000000, mult: 3.0, emoji: "☁️" },
        s9: { name: "Alien-Technik", kosten: 1000000000, mult: 4.0, emoji: "🌍" },
        s10: { name: "Urknall-Teig", kosten: 5000000000, mult: 5.0, emoji: "⭐" }
    };

    // LUSTIGE ACHIEVEMENTS
    const achData = [
        { id: 1, type: 'cookies', target: 1, title: "Frisch gebacken", desc: "Dein allererster Krümel.", icon: "👶" },
        { id: 2, type: 'cookies', target: 1000, title: "Keks-Messie", desc: "Du hortest Dinge...", icon: "🧺" },
        { id: 3, type: 'build', b: 'oma', target: 1, title: "Enkel des Jahres", desc: "Oma ist jetzt angestellt.", icon: "👵" },
        { id: 4, type: 'build', b: 'oma', target: 50, title: "Oma-Kartell", desc: "Sie kontrollieren den Schwarzmarkt.", icon: "🕶️" },
        { id: 5, type: 'cookies', target: 1000000, title: "Zucker-Koma", desc: "Eine Million Kekse im Blut.", icon: "💉" },
        { id: 6, type: 'build', b: 'mine', target: 10, title: "Deep Space Bake", desc: "Zu tief gegraben.", icon: "⛏️" },
        { id: 7, type: 'build', b: 'fabrik', target: 5, title: "Smog-Bäcker", desc: "Die Luft schmeckt nach Schoko.", icon: "🏭" },
        { id: 8, type: 'cookies', target: 1000000000, title: "Illuminati-Teig", desc: "Du gehörst zur Elite.", icon: "👁️" },
        { id: 9, type: 'build', b: 'portal', target: 1, title: "Vorsicht, Wurm!", desc: "Kekse aus der 5. Dimension.", icon: "🌀" },
        { id: 10, type: 'cookies', target: 1e12, title: "Keks-Singularität", desc: "Das Universum kollabiert vor Süße.", icon: "🕳️" }
    ];
    // Restliche füllen für 100 Stück
    for(let i=11; i<=100; i++) {
        achData.push({ id: i, type: 'cookies', target: Math.floor(50000 * Math.pow(i, 4.3)), title: `Keks-Wahnsinn Stufe ${i}`, desc: "Einfach immer weiter...", icon: "🔥" });
    }

    function formatNum(n) {
        if (n >= 1e12) return (n/1e12).toFixed(2) + "T";
        if (n >= 1e9) return (n/1e9).toFixed(2) + "B";
        if (n >= 1e6) return (n/1e6).toFixed(2) + "M";
        if (n >= 1e3) return (n/1e3).toFixed(1) + "k";
        return Math.floor(n).toLocaleString();
    }

    function getCps() { return Object.values(buildings).reduce((a,b)=>a+(b.cps?b.anzahl*b.cps:0), 0) * multiplier; }

    window.renderShop = () => {
        const bc = document.getElementById('buildingsContainer'), sc = document.getElementById('specialsContainer');
        bc.innerHTML = ""; sc.innerHTML = "";
        for(let id in buildings) {
            let b = buildings[id];
            bc.innerHTML += `<div class="shopItem"><span>${b.emoji}</span><div class="item-info"><b>${b.name} (${b.anzahl})</b><span>${formatNum(b.kosten)} 🍪</span></div><button class="buy-btn" onclick="buyBuilding('${id}')" ${cookies<b.kosten?'disabled':''}>Kauf</button></div>`;
        }
        for(let id in specials) {
            let s = specials[id];
            sc.innerHTML += `<div class="shopItem" style="border-color:var(--accent)"><span>${s.emoji}</span><div class="item-info"><b>${s.name} (+${s.mult}x)</b><span>${formatNum(s.kosten)} 🍪</span></div><button class="buy-btn" onclick="buySpecial('${id}')" ${cookies<s.kosten?'disabled':''}>Kauf</button></div>`;
        }
    };

    window.renderAchs = () => {
        const ac = document.getElementById('achievementsContainer'); ac.innerHTML = "";
        achData.forEach(a => {
            let done = unlockedAchs.includes(a.id);
            ac.innerHTML += `<div class="shopItem achievement-card ${done?'unlocked':''}"><span>${a.icon}</span><div class="item-info"><b>${a.title}</b><span>${a.desc}</span></div></div>`;
        });
        document.getElementById('achCountDisplay').innerText = unlockedAchs.length;
    };

    window.buyBuilding = (id) => {
        let b = buildings[id]; if(cookies >= b.kosten) { playSnd(clickSound); cookies -= b.kosten; b.anzahl++; b.kosten = Math.floor(b.base * Math.pow(1.15, b.anzahl)); renderShop(); updateUI(); checkAchs(); saveGame(); }
    };

    window.buySpecial = (id) => {
        let s = specials[id]; if(cookies >= s.kosten) { playSnd(clickSound); cookies -= s.kosten; multiplier += s.mult; s.kosten *= 10; renderShop(); updateUI(); saveGame(); }
    };

    // KLICK MIT POPUPS
    document.getElementById('cookie').addEventListener('click', (e) => {
        playSnd(clickSound);
        let gain = (1 + buildings.click.anzahl * buildings.click.cpc) * multiplier; 
        cookies += gain; totalEver += gain; updateUI(); checkAchs();
        
        const pop = document.createElement('div');
        pop.className = 'click-popup';
        pop.innerText = `+${formatNum(gain)}`;
        pop.style.left = `${e.clientX}px`; pop.style.top = `${e.clientY}px`;
        document.body.appendChild(pop);
        setTimeout(() => pop.remove(), 800);

        document.getElementById('cookie').classList.add('klick-anim');
        setTimeout(() => document.getElementById('cookie').classList.remove('klick-anim'), 50);
    });

    function updateUI() { 
        document.getElementById('cookieCountDisplay').innerText = formatNum(cookies); 
        document.getElementById('cpsDisplay').innerText = formatNum(getCps()); 
    }

    function checkAchs() {
        let changed = false;
        achData.forEach(a => {
            if(!unlockedAchs.includes(a.id)) {
                if(a.type === 'cookies' && totalEver >= a.target) { unlockedAchs.push(a.id); playSnd(achSound); changed = true; }
                if(a.type === 'build' && buildings[a.b].anzahl >= a.target) { unlockedAchs.push(a.id); playSnd(achSound); changed = true; }
            }
        });
        if(changed) renderAchs();
    }

    function saveGame() {
        const data = { cookies, totalEver, multiplier, bData: Object.fromEntries(Object.entries(buildings).map(([k,v])=>[k,v.anzahl])), achs: unlockedAchs, offlineActive, lastSave: Date.now() };
        localStorage.setItem('crumbl_v6_save', JSON.stringify(data));
        if(currentUser) setDoc(doc(db, "users", currentUser.uid), { ...data, username: document.getElementById('display-name').innerText }, { merge: true });
    }

    async function loadData(d) {
        if(!d) return;
        cookies = d.cookies || 0; totalEver = d.totalEver || 0; multiplier = d.multiplier || 1;
        unlockedAchs = d.achs || []; offlineActive = d.offlineActive !== undefined ? d.offlineActive : true;
        if(d.bData) for(let k in d.bData) if(buildings[k]) { buildings[k].anzahl = d.bData[k]; buildings[k].kosten = Math.floor(buildings[k].base * Math.pow(1.15, buildings[k].anzahl)); }
        
        if(offlineActive && d.lastSave) {
            let seconds = Math.floor((Date.now() - d.lastSave) / 1000);
            if(seconds > 20) {
                let gain = seconds * (getCps() * 0.10);
                if(gain > 1) {
                    cookies += gain; totalEver += gain;
                    document.getElementById('offlineGainDisplay').innerText = formatNum(gain);
                    document.getElementById('offlineModal').style.display = 'flex';
                }
            }
        }
        updateUI(); renderShop(); renderAchs();
    }

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            currentUser = user;
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists()) {
                loadData(snap.data());
                document.getElementById('display-name').innerText = snap.data().username || "Bäcker";
                document.getElementById('name-display-main').innerText = snap.data().username || "Bäcker";
            } else {
                const local = localStorage.getItem('crumbl_v6_save');
                if(local) loadData(JSON.parse(local));
            }
            document.getElementById('auth-section').style.display = 'none'; document.getElementById('user-info').style.display = 'block';
        }
    });

    document.getElementById('auth-btn').onclick = async () => {
        const e = document.getElementById('emailInput').value, p = document.getElementById('passwordInput').value, u = document.getElementById('usernameInput').value;
        const res = await signInWithEmailAndPassword(auth, e, p).catch(() => createUserWithEmailAndPassword(auth, e, p));
        if(res.user && u) await setDoc(doc(db, "users", res.user.uid), { username: u, totalEver: totalEver || 0 }, { merge: true });
    };

    document.getElementById('logout-btn').onclick = () => { signOut(auth).then(() => location.reload()); };
    document.getElementById('reset-btn').onclick = () => { if(confirm("Spielstand löschen?")) { localStorage.clear(); location.reload(); } };

    // Ranking Snapshot (nach totalEver sortiert)
    onSnapshot(query(collection(db, "users"), orderBy("totalEver", "desc"), limit(10)), (snap) => {
        let h = ""; let i = 1;
        snap.forEach(d => { 
            let data = d.data(); 
            h += `<div class="leader-card"><div class="rank-badge">#${i++}</div><div style="flex-grow:1"><b>${data.username || 'Gast'}</b><br><small>🍪 ${formatNum(data.totalEver || 0)}</small></div><div>🏆 ${data.achs ? data.achs.length : 0}</div></div>`; 
        });
        document.getElementById('leaderboardContainer').innerHTML = h || "Keine Spieler gefunden.";
    });

    setInterval(saveGame, 20000);
    setInterval(() => { cookies += getCps() / 10; totalEver += getCps() / 10; updateUI(); }, 100);

    // Hintergrund-Effekt
    setInterval(() => { 
        const rc = document.getElementById('rain-container');
        const c = document.createElement('div');
        c.className = 'rain-cookie'; c.innerText = '🍪';
        c.style.left = Math.random() * 100 + 'vw';
        let dur = Math.random() * 4 + 4;
        c.style.animationDuration = dur + 's';
        rc.appendChild(c); setTimeout(() => c.remove(), dur * 1000);
    }, 700);

    document.querySelectorAll('.nav-btn').forEach(btn => { 
        btn.onclick = () => { 
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(btn.dataset.view).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
            if(btn.dataset.view === 'view-shop') renderShop();
            if(btn.dataset.view === 'view-achievements') renderAchs();
        }; 
    });

    renderShop(); renderAchs();
</script>
</body>
</html>
