<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crumbl Clicker - Ultimate Fixed Edition</title>
    <style>
        :root { --primary: #f1c40f; --bg: #0f0f0f; --panel: #1a1a1a; --text: #ffffff; --accent: #3498db; --gold: #ffd700; --danger: #e74c3c; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        
        #rain-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .rain-cookie { position: absolute; top: -50px; font-size: 24px; opacity: 0.2; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        header { background: var(--panel); padding: 10px; text-align: center; border-bottom: 2px solid #333; z-index: 100; }
        #cookieCountDisplay { font-size: 2.2em; font-weight: bold; color: var(--primary); }
        
        #main-content { flex-grow: 1; overflow-y: auto; position: relative; z-index: 10; padding-bottom: 80px; }
        .view { display: none; padding: 15px; }
        .view.active { display: block; }

        #view-keks { flex-direction: column; align-items: center; justify-content: center; height: 80%; }
        #view-keks.active { display: flex; }
        #cookie { width: 50vw; max-width: 180px; cursor: pointer; transition: transform 0.05s; z-index: 20; }
        .klick-anim { transform: scale(0.9); }

        .category-title { border-left: 4px solid var(--primary); padding-left: 10px; margin: 25px 0 10px 0; color: var(--primary); font-weight: bold; font-size: 0.9rem; text-transform: uppercase; }
        .shopItem { background: #1e1e1e; padding: 12px; margin: 8px 0; border-radius: 12px; display: flex; align-items: center; border: 1px solid #333; }
        .item-info { flex-grow: 1; margin-left: 12px; }
        .item-info b { display: block; font-size: 0.9rem; }
        .item-info span { color: var(--primary); font-size: 0.8rem; }
        
        button.buy-btn { background: #e67e22; border: none; color: white; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.3; filter: grayscale(1); }

        .achievement-card { opacity: 0.2; transition: 0.3s; }
        .achievement-card.unlocked { opacity: 1; border-color: var(--gold); background: rgba(255, 215, 0, 0.1); }

        .leader-card { background: #1e1e1e; padding: 12px; margin-bottom: 8px; border-radius: 12px; display: flex; align-items: center; border: 1px solid #333; }
        .rank-badge { width: 35px; font-weight: bold; color: var(--primary); font-size: 1.1rem; }

        nav { height: 70px; background: var(--panel); display: flex; border-top: 1px solid #333; position: fixed; bottom: 0; width: 100%; z-index: 200; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 0.65rem; cursor: pointer; }
        .nav-btn.active { color: var(--primary); }

        #offlineModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="rain-container"></div>

<div id="offlineModal">
    <div style="background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; border: 2px solid var(--primary);">
        <h3>Willkommen zurück!</h3>
        <p>Deine Helfer waren fleißig:</p>
        <p style="font-size: 2rem; color: var(--primary)">+ <span id="offlineGainDisplay">0</span> 🍪</p>
        <button onclick="document.getElementById('offlineModal').style.display='none'" style="padding: 10px 20px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; color: black;">Sammeln</button>
    </div>
</div>

<header>
    <div id="cookieCountDisplay">0</div>
    <div style="font-size: 0.8rem; color: #888;">CPS: <span id="cpsDisplay">0</span> | Erfolge: <span id="achCountDisplay">0</span>/100</div>
</header>

<div id="main-content">
    <div id="view-keks" class="view active">
        <img id="cookie" src="cookie.png">
        <div id="name-display-main" style="margin-top:15px; font-weight:bold; color:var(--primary)">Gast</div>
    </div>
    
    <div id="view-shop" class="view">
        <div class="category-title">Gebäude</div>
        <div id="buildingsContainer"></div>
        <div class="category-title">Spezial-Upgrades</div>
        <div id="specialsContainer"></div>
    </div>

    <div id="view-achievements" class="view">
        <h2 style="text-align:center">Deine Trophäen</h2>
        <div id="achievementsContainer"></div>
    </div>

    <div id="view-leaderboard" class="view">
        <h2 style="text-align:center">Bestenliste</h2>
        <div id="leaderboardContainer"></div>
    </div>

    <div id="view-profile" class="view">
        <div id="auth-section">
            <input type="text" id="usernameInput" placeholder="Name für Ranking" style="width:100%; padding:10px; margin-bottom:5px; background:#222; color:white; border:1px solid #444; border-radius:5px;">
            <input type="email" id="emailInput" placeholder="E-Mail" style="width:100%; padding:10px; margin-bottom:5px; background:#222; color:white; border:1px solid #444; border-radius:5px;">
            <input type="password" id="passwordInput" placeholder="Passwort" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:white; border:1px solid #444; border-radius:5px;">
            <button id="auth-btn" style="width:100%; padding:12px; background:var(--primary); border:none; border-radius:8px; font-weight:bold; color:black;">Login / Registrieren</button>
        </div>
        <div id="user-info" style="display:none; text-align:center;">
            <h2 id="display-name">Spieler</h2>
            <div style="background:#222; padding:15px; border-radius:10px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
                <span>Offline-Produktion (5%)</span>
                <input type="checkbox" id="offlineToggle" checked style="width:20px; height:20px;">
            </div>
            <button id="logout-btn" style="width:100%; padding:10px; background:#444; color:white; border:none; border-radius:8px; margin-bottom:10px; font-weight:bold;">Ausloggen</button>
            <button id="reset-btn" style="width:100%; padding:10px; background:var(--danger); color:white; border:none; border-radius:8px; font-weight:bold;">Account Zurücksetzen</button>
        </div>
    </div>
</div>

<nav>
    <div class="nav-btn active" data-view="view-keks">🍪<br>Keks</div>
    <div class="nav-btn" data-view="view-shop">🏪<br>Shop</div>
    <div class="nav-btn" data-view="view-achievements">🏆<br>Erfolge</div>
    <div class="nav-btn" data-view="view-leaderboard">📊<br>Ranking</div>
    <div class="nav-btn" data-view="view-profile">👤<br>Profil</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBw_qDPQsWU1sl5KVE-74WCHsqPI0HmxN8",
        authDomain: "crumblclicker.firebaseapp.com",
        projectId: "crumblclicker",
        storageBucket: "crumblclicker.firebasestorage.app",
        messagingSenderId: "912766884531",
        appId: "1:912766884531:web:ac49743ae7d2684f12aec6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let cookies = 0; let totalEver = 0; let multiplier = 1; let offlineActive = true;
    let currentUser = null; let unlockedAchs = [];

    const buildings = {
        click: { name: "Klick-Training", kosten: 50, base: 50, cpc: 1, anzahl: 0, emoji: "💪" },
        cursor: { name: "Cursor", kosten: 15, base: 15, cps: 0.5, anzahl: 0, emoji: "🖱️" },
        oma: { name: "Oma", kosten: 100, base: 100, cps: 4, anzahl: 0, emoji: "👵" },
        farm: { name: "Farm", kosten: 1100, base: 1100, cps: 15, anzahl: 0, emoji: "🚜" },
        mine: { name: "Mine", kosten: 12000, base: 12000, cps: 50, anzahl: 0, emoji: "⛏️" },
        fabrik: { name: "Fabrik", kosten: 130000, base: 130000, cps: 260, anzahl: 0, emoji: "🏭" },
        bank: { name: "Bank", kosten: 1400000, base: 1400000, cps: 1400, anzahl: 0, emoji: "🏦" },
        tempel: { name: "Tempel", kosten: 20000000, base: 20000000, cps: 7800, anzahl: 0, emoji: "🕍" },
        wizard: { name: "Zauberturm", kosten: 330000000, base: 330000000, cps: 44000, anzahl: 0, emoji: "🧙" },
        portal: { name: "Portal", kosten: 5000000000, base: 5000000000, cps: 250000, anzahl: 0, emoji: "🌀" },
        zeit: { name: "Zeitmaschine", kosten: 75000000000, base: 75000000000, cps: 1600000, anzahl: 0, emoji: "⏳" },
        gott: { name: "Keks-Gott", kosten: 999999999999, base: 999999999999, cps: 10000000, anzahl: 0, emoji: "✨" }
    };

    const specials = {
        s1: { name: "Glücksklee", kosten: 5000, mult: 0.2, emoji: "🍀" },
        s2: { name: "Zuckerguss", kosten: 25000, mult: 0.3, emoji: "🧁" },
        s3: { name: "Milchglas", kosten: 100000, mult: 0.5, emoji: "🥛" },
        s4: { name: "Goldener Ofen", kosten: 500000, mult: 1.0, emoji: "🔥" },
        s5: { name: "Schoko-Chip", kosten: 2000000, mult: 1.5, emoji: "🍫" },
        s6: { name: "Teig-Rolle", kosten: 10000000, mult: 2.0, emoji: "🥖" },
        s7: { name: "Meister-Bäcker", kosten: 50000000, mult: 2.5, emoji: "👨‍🍳" },
        s8: { name: "Backstube Deluxe", kosten: 250000000, mult: 3.0, emoji: "🏠" },
        s9: { name: "Keks-Planeten", kosten: 1000000000, mult: 4.0, emoji: "🌍" },
        s10: { name: "Sternen-Staub", kosten: 5000000000, mult: 5.0, emoji: "⭐" },
        s11: { name: "Super-Nova", kosten: 25000000000, mult: 7.0, emoji: "💥" },
        s12: { name: "Dimensions-Teig", kosten: 100000000000, mult: 10.0, emoji: "🔮" },
        s13: { name: "Götter-Rezept", kosten: 500000000000, mult: 15.0, emoji: "📜" },
        s14: { name: "Unendlichkeit", kosten: 2000000000000, mult: 25.0, emoji: "♾️" },
        s15: { name: "Keks-Multiversum", kosten: 10000000000000, mult: 50.0, emoji: "🌌" }
    };

    const achData = [];
    for(let i=1; i<=88; i++) achData.push({ id: i, type: 'cookies', target: Math.floor(100 * Math.pow(i, 3.4)), title: `Sammler Stufe ${i}`, desc: `Sammle ${formatNum(Math.floor(100 * Math.pow(i, 3.4)))} Kekse.`, icon: "🍪" });
    achData.push({ id: 89, type: 'build', b: 'oma', target: 10, title: "Oma-Power", desc: "10 Omas backen!", icon: "👵" });
    achData.push({ id: 90, type: 'build', b: 'click', target: 50, title: "Klick-Profi", desc: "50 Klick-Trainings.", icon: "🏋️" });
    for(let i=91; i<=100; i++) achData.push({ id: i, type: 'cookies', target: 1e12 * (i-90), title: `Keks-Gott ${i}`, desc: "Unmenschliche Mengen.", icon: "✨" });

    function formatNum(n) {
        if (n >= 1e12) return (n/1e12).toFixed(2) + "T";
        if (n >= 1e9) return (n/1e9).toFixed(2) + "B";
        if (n >= 1e6) return (n/1e6).toFixed(2) + "M";
        if (n >= 1e3) return (n/1e3).toFixed(1) + "k";
        return Math.floor(n).toLocaleString();
    }

    function getCps() { return Object.values(buildings).reduce((a,b)=>a+(b.cps?b.anzahl*b.cps:0), 0) * multiplier; }

    window.renderShop = () => {
        const bc = document.getElementById('buildingsContainer'), sc = document.getElementById('specialsContainer');
        bc.innerHTML = ""; sc.innerHTML = "";
        for(let id in buildings) {
            let b = buildings[id];
            bc.innerHTML += `<div class="shopItem"><span>${b.emoji}</span><div class="item-info"><b>${b.name} (${b.anzahl})</b><span>${formatNum(b.kosten)} 🍪</span></div><button class="buy-btn" onclick="buyBuilding('${id}')" ${cookies<b.kosten?'disabled':''}>Kauf</button></div>`;
        }
        for(let id in specials) {
            let s = specials[id];
            sc.innerHTML += `<div class="shopItem" style="border-color:var(--accent)"><span>${s.emoji}</span><div class="item-info"><b>${s.name} (+${s.mult}x)</b><span>${formatNum(s.kosten)} 🍪</span></div><button class="buy-btn" onclick="buySpecial('${id}')" ${cookies<s.kosten?'disabled':''}>Kauf</button></div>`;
        }
    };

    window.renderAchs = () => {
        const ac = document.getElementById('achievementsContainer'); ac.innerHTML = "";
        achData.forEach(a => {
            let done = unlockedAchs.includes(a.id);
            ac.innerHTML += `<div class="shopItem achievement-card ${done?'unlocked':''}"><span>${a.icon}</span><div class="item-info"><b>${a.title}</b><span>${a.desc}</span></div></div>`;
        });
        document.getElementById('achCountDisplay').innerText = unlockedAchs.length;
    };

    window.buyBuilding = (id) => {
        let b = buildings[id]; if(cookies >= b.kosten) { cookies -= b.kosten; b.anzahl++; b.kosten = Math.floor(b.base * Math.pow(1.15, b.anzahl)); renderShop(); updateUI(); checkAchs(); }
    };

    window.buySpecial = (id) => {
        let s = specials[id]; if(cookies >= s.kosten) { cookies -= s.kosten; multiplier += s.mult; s.kosten *= 8; renderShop(); updateUI(); }
    };

    document.getElementById('cookie').onclick = () => {
        let gain = (1 + buildings.click.anzahl * buildings.click.cpc) * multiplier; cookies += gain; totalEver += gain; updateUI(); checkAchs();
        document.getElementById('cookie').classList.add('klick-anim'); setTimeout(() => document.getElementById('cookie').classList.remove('klick-anim'), 50);
    };

    function updateUI() { document.getElementById('cookieCountDisplay').innerText = formatNum(cookies); document.getElementById('cpsDisplay').innerText = formatNum(getCps()); }

    function checkAchs() {
        let changed = false;
        achData.forEach(a => {
            if(!unlockedAchs.includes(a.id)) {
                if(a.type === 'cookies' && totalEver >= a.target) { unlockedAchs.push(a.id); changed = true; }
                if(a.type === 'build' && buildings[a.b].anzahl >= a.target) { unlockedAchs.push(a.id); changed = true; }
            }
        });
        if(changed) renderAchs();
    }

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            currentUser = user;
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists()) {
                let d = snap.data(); cookies = d.cookies || 0; totalEver = d.totalEver || 0; multiplier = d.multiplier || 1; unlockedAchs = d.achs || [];
                offlineActive = d.offlineActive !== undefined ? d.offlineActive : true;
                document.getElementById('offlineToggle').checked = offlineActive;
                document.getElementById('display-name').innerText = d.username || "Spieler";
                document.getElementById('name-display-main').innerText = d.username || "Spieler";
                if(offlineActive && d.lastSave) {
                    let gain = ((Date.now() - d.lastSave) / 1000) * (getCps() * 0.05);
                    if(gain > 1) { cookies += gain; totalEver += gain; document.getElementById('offlineGainDisplay').innerText = formatNum(gain); document.getElementById('offlineModal').style.display = 'flex'; }
                }
                if(d.bData) for(let k in d.bData) if(buildings[k]) { buildings[k].anzahl = d.bData[k]; buildings[k].kosten = Math.floor(buildings[k].base * Math.pow(1.15, buildings[k].anzahl)); }
            }
            document.getElementById('auth-section').style.display = 'none'; document.getElementById('user-info').style.display = 'block';
            renderShop(); renderAchs(); updateUI();
        }
    });

    // Buttons Logik
    document.getElementById('auth-btn').onclick = async () => {
        const e = document.getElementById('emailInput').value, p = document.getElementById('passwordInput').value, u = document.getElementById('usernameInput').value;
        const res = await signInWithEmailAndPassword(auth, e, p).catch(() => createUserWithEmailAndPassword(auth, e, p));
        if(res.user && u) await setDoc(doc(db, "users", res.user.uid), { username: u }, { merge: true });
    };

    document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());

    document.getElementById('reset-btn').onclick = async () => {
        if(confirm("Bist du sicher? Dein gesamter Cloud-Fortschritt wird gelöscht!")) {
            if(currentUser) await setDoc(doc(db, "users", currentUser.uid), { cookies: 0, totalEver: 0, multiplier: 1, bData: {}, achs: [] }, {merge: true});
            location.reload();
        }
    };

    document.getElementById('offlineToggle').onchange = (e) => { offlineActive = e.target.checked; };

    onSnapshot(query(collection(db, "users"), orderBy("totalEver", "desc"), limit(15)), (snap) => {
        let h = ""; let i = 1;
        snap.forEach(d => {
            let data = d.data();
            h += `<div class="leader-card"><div class="rank-badge">#${i++}</div><div style="flex-grow:1"><b>${data.username || 'Gast'}</b><br><small>Gesamt: ${formatNum(data.totalEver || 0)}</small></div><div style="color:var(--gold)">🏆 ${data.achs ? data.achs.length : 0}</div></div>`;
        });
        document.getElementById('leaderboardContainer').innerHTML = h;
    });

    setInterval(() => { if(currentUser) setDoc(doc(db, "users", currentUser.uid), { cookies, totalEver, multiplier, bData: Object.fromEntries(Object.entries(buildings).map(([k,v])=>[k,v.anzahl])), achs: unlockedAchs, offlineActive, lastSave: Date.now() }, { merge: true }); }, 10000);
    setInterval(() => { cookies += getCps() / 10; totalEver += getCps() / 10; updateUI(); }, 100);
    setInterval(() => { if(Math.random() < 0.2) { const rc = document.getElementById('rain-container'); const c = document.createElement('div'); c.className = 'rain-cookie'; c.innerText = '🍪'; c.style.left = Math.random() * 100 + 'vw'; let d = Math.random() * 3 + 2; c.style.animationDuration = d + 's'; rc.appendChild(c); setTimeout(() => c.remove(), d * 1000); } }, 800);

    document.querySelectorAll('.nav-btn').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(btn.dataset.view).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active')); btn.classList.add('active'); if(btn.dataset.view === 'view-shop') renderShop(); }; });
    renderShop(); renderAchs();
</script>
</body>
</html>
