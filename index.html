<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crumbl Clicker: Legend v2.1.3</title>
    <style>
        :root { --primary: #f1c40f; --bg: #050505; --panel: #111; --text: #eee; --accent: #3498db; --gold: #ffd700; --danger: #e74c3c; --success: #2ecc71; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; user-select: none; }
        
        .version-tag { position: fixed; top: 12px; left: 15px; font-size: 0.8rem; color: #666; font-weight: bold; z-index: 1000; pointer-events: none; }

        /* Universelles Benachrichtigungs-System */
        .game-notification { position: fixed; top: 20px; right: 20px; background: #1a1a1a; border: 2px solid var(--primary); border-radius: 12px; padding: 15px; color: white; z-index: 10000; animation: slideIn 0.5s ease, fadeOut 0.5s ease 4.5s forwards; box-shadow: 0 0 20px rgba(0,0,0,0.5); min-width: 220px; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-20px); } }

        #rain-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .rain-cookie { position: absolute; top: -50px; font-size: 24px; opacity: 0.4; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        .particle { position: fixed; color: var(--primary); font-weight: 900; pointer-events: none; z-index: 2000; animation: pFloat 0.7s ease-out forwards; }
        @keyframes pFloat { 0% { transform: translate(-50%, -50%); opacity: 1; } 100% { transform: translate(-50%, -100px); opacity: 0; } }

        header { background: var(--panel); padding: 15px; text-align: center; border-bottom: 2px solid #222; position: relative; z-index: 100; }
        #cookieCountDisplay { font-size: 2.5em; font-weight: 900; color: var(--primary); }
        
        #main-content { height: calc(100vh - 160px); overflow-y: auto; padding-bottom: 80px; position: relative; z-index: 10; }
        .view { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #view-keks { text-align: center; padding-top: 50px; }
        #cookie { width: 55vw; max-width: 200px; cursor: pointer; transition: transform 0.05s; }
        #cookie:active { transform: scale(0.9); }

        .shop-item { background: #181818; padding: 15px; margin: 10px 0; border-radius: 12px; display: flex; align-items: center; border: 1px solid #222; }
        .item-info { flex-grow: 1; margin-left: 15px; }
        .item-price { color: var(--primary); font-weight: bold; font-size: 0.9rem; }
        .buy-btn { background: var(--success); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; min-width: 80px; }
        .buy-btn:disabled { background: #333 !important; color: #666 !important; cursor: not-allowed; opacity: 0.5; }

        .ach-card { display: flex; align-items: center; background: #161616; padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #222; opacity: 0.2; }
        .ach-card.unlocked { opacity: 1; border-color: var(--gold); }
        .progress-bar-bg { background: #222; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-bar-fill { background: var(--gold); height: 100%; width: 0%; transition: 0.5s; }

        nav { height: 75px; background: var(--panel); display: flex; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #222; z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: #666; cursor: pointer; }
        .nav-btn.active { color: var(--primary); font-weight: bold; }
        
        .box { background: #151515; padding: 20px; border-radius: 12px; margin-top: 15px; border: 1px solid #222; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; background: #000; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="version-tag">v2.1.3</div>
<div id="rain-container"></div>

<header>
    <div id="cookieCountDisplay">0</div>
    <div style="font-size: 0.8rem; color: #888;">
        <span id="cpsDisplay">0</span> CPS | <span id="cpcDisplay">1</span> PRO KLICK
    </div>
</header>

<div id="main-content">
    <div id="view-keks" class="view active">
        <img id="cookie" src="cookie.png" alt="Cookie">
        <h2 id="user-display-name" style="margin-top:20px; letter-spacing:2px; color:#555;">GAST-BÄCKER</h2>
    </div>

    <div id="view-shop" class="view">
        <h3 style="color:var(--primary); font-size: 0.8rem; letter-spacing: 1px;">GEBÄUDE (11 VERFÜGBAR)</h3>
        <div id="buildingsContainer"></div>
        <h3 style="color:var(--accent); margin-top:20px; font-size: 0.8rem; letter-spacing: 1px;">SPEZIAL ITEMS (UPGRADES)</h3>
        <div id="upgradesContainer"></div>
    </div>

    <div id="view-achievements" class="view">
        <div style="text-align:center; padding:10px;">
            <b style="color:var(--gold)">ERFOLGE: <span id="ach-count-text">0/0</span></b>
            <div class="progress-bar-bg"><div id="ach-bar-fill" class="progress-bar-fill"></div></div>
        </div>
        <div id="achievementsContainer"></div>
    </div>

    <div id="view-leaderboard" class="view">
        <h2 style="text-align:center;">GLOBALES RANKING</h2>
        <div id="leaderboardContainer"></div>
    </div>

    <div id="view-profile" class="view">
        <div id="auth-box" class="box">
            <h3>LOGIN / REGISTRIERUNG</h3>
            <input type="text" id="regName" placeholder="Anzeigename">
            <input type="email" id="regEmail" placeholder="E-Mail">
            <input type="password" id="regPass" placeholder="Passwort">
            <button id="loginBtn" style="width:100%; padding:15px; background:var(--primary); border:none; border-radius:8px; font-weight:bold; margin-top:10px;">BETRETEN</button>
        </div>
        <div id="profile-box" class="box" style="display:none; text-align:center;">
            <h2 id="prof-name" style="color:var(--primary)">...</h2>
            <div class="box" style="text-align:left; border-color:var(--accent)">
                <b style="color:var(--accent)">📤 KEKS-TRANSFER</b>
                <input type="text" id="traName" placeholder="Empfänger Name">
                <input type="number" id="traAmt" placeholder="Menge">
                <button id="traBtn" style="width:100%; padding:10px; background:var(--accent); color:white; border:none; border-radius:8px;">SENDEN</button>
            </div>
            <button id="logoutBtn" style="width:100%; background:#333; color:white; border:none; padding:12px; border-radius:8px; margin-top:20px;">ABMELDEN</button>
            <button id="resetBtn" style="width:100%; background:var(--danger); color:white; border:none; padding:12px; border-radius:8px; margin-top:10px; font-weight:bold;">⚠️ ACCOUNT LÖSCHEN (RESET)</button>
        </div>
    </div>
</div>

<nav id="main-nav">
    <div class="nav-btn active" data-view="view-keks"><span>🍪</span><br><span>HOME</span></div>
    <div class="nav-btn" data-view="view-shop"><span>🏪</span><br><span>SHOP</span></div>
    <div class="nav-btn" data-view="view-achievements"><span>🏆</span><br><span>LOG</span></div>
    <div class="nav-btn" data-view="view-leaderboard"><span>📊</span><br><span>RANK</span></div>
    <div class="nav-btn" data-view="view-profile"><span>👤</span><br><span>USER</span></div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, getDocs, where, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBw_qDPQsWU1sl5KVE-74WCHsqPI0HmxN8", authDomain: "crumblclicker.firebaseapp.com", projectId: "crumblclicker", storageBucket: "crumblclicker.firebasestorage.app", messagingSenderId: "912766884531", appId: "1:912766884531:web:ac49743ae7d2684f12aec6" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let cookies = 0, totalEver = 0, currentUser = null, isLoading = true, unlockedAchs = [];
    const sounds = { click: new Audio('click.mp3'), ach: new Audio('achieve.mp3') };

    const buildings = {
        maus: { name: "Maus", kosten: 15, base: 15, cps: 0.2, anzahl: 0, icon: "🖱️", quotes: ["Klick-Sklave", "Maus-Massaker", "Sehnenscheidenentzündung"] },
        oma: { name: "Oma", kosten: 100, base: 100, cps: 1, anzahl: 0, icon: "👵", quotes: ["Keks-Dealerin", "Strick-Mafia", "Heimliche Herrscherin"] },
        farm: { name: "Farm", kosten: 1100, base: 1100, cps: 8, anzahl: 0, icon: "🚜", quotes: ["GVO-Kekse", "Bauer sucht Keks", "Monokultur"] },
        mine: { name: "Mine", kosten: 12000, base: 12000, cps: 47, anzahl: 0, icon: "⛏️", quotes: ["Keks-Erz", "Staublunge", "Diamant-Zucker"] },
        fabrik: { name: "Fabrik", kosten: 130000, base: 130000, cps: 260, anzahl: 0, icon: "🏭", quotes: ["Massenproduktion", "Abgas-Zucker", "Fließband-Krümel"] },
        bank: { name: "Bank", kosten: 1400000, base: 1400000, cps: 1400, anzahl: 0, icon: "🏦", quotes: ["Keks-Inflation", "Börsenkrümel", "Finanz-Hai"] },
        tempel: { name: "Tempel", kosten: 20000000, base: 20000000, cps: 7800, anzahl: 0, icon: "🏛️", quotes: ["Keks-Reliquie", "Teig-Opferung", "Hohepriester"] },
        zauberer: { name: "Zauberturm", kosten: 330000000, base: 330000000, cps: 44000, anzahl: 0, icon: "🧙", quotes: ["Hokuspokus", "Mana-Mehl", "Abrakadabra"] },
        rakete: { name: "Rakete", kosten: 5100000000, base: 5100000000, cps: 260000, anzahl: 0, icon: "🚀", quotes: ["Mars-Besiedlung", "Space-Teig", "Elon Musk weint"] },
        zeit: { name: "Zeitmaschine", kosten: 75000000000, base: 75000000000, cps: 1600000, anzahl: 0, icon: "⌛", quotes: ["Keks vor Christus", "Gestern gebacken", "Paradoxon"] },
        gott: { name: "Keks-Gott", kosten: 999999999999, base: 999999999999, cps: 10000000, anzahl: 0, icon: "👼", quotes: ["Amen", "Omnipotenz", "Das Alpha und Omega"] }
    };

    const upgrades = {
        trainer: { name: "Klick-Trainer", kosten: 50, base: 50, power: 1, anzahl: 0, icon: "💪" },
        ofen: { name: "Turbo-Ofen", kosten: 5000, base: 5000, power: 15, anzahl: 0, icon: "🔥" },
        goldmaus: { name: "Platin-Maus", kosten: 100000, base: 100000, power: 100, anzahl: 0, icon: "🖱️✨" },
        finger: { name: "Diamond Finger", kosten: 2500000, base: 2500000, power: 1000, anzahl: 0, icon: "💎" },
        matrix: { name: "Cookie Matrix", kosten: 100000000, base: 100000000, power: 25000, anzahl: 0, icon: "🕶️" }
    };

    let allAchs = [];
    const milestoness = [1, 5, 10, 25, 50, 100, 150, 200, 250, 300, 400, 500];
    Object.entries(buildings).forEach(([id, b]) => {
        milestoness.forEach((m, idx) => {
            const quote = b.quotes[idx % b.quotes.length];
            allAchs.push({ id: `b_${id}_${m}`, target: m, bid: id, type: 'building', title: `${quote} (${m}x)`, desc: `Du hast ${m} ${b.name} Gebäude.` });
        });
    });
    const cMilestones = [100, 500, 1000, 5000, 10000, 50000, 100000, 500000, 1000000, 10000000, 100000000, 1000000000, 10000000000, 100000000000, 1000000000000];
    cMilestones.forEach(t => allAchs.push({ id: `c_${t}`, target: t, type: 'cookies', title: `Bäcker-Rang: ${format(t)}`, desc: `Backe insgesamt ${format(t)} Kekse.` }));

    function format(n) {
        if (n >= 1e12) return (n/1e12).toFixed(2) + " T";
        if (n >= 1e9) return (n/1e9).toFixed(2) + " B";
        if (n >= 1e6) return (n/1e6).toFixed(2) + " M";
        if (n >= 1e3) return (n/1e3).toFixed(1) + " k";
        return Math.floor(n).toLocaleString();
    }

    // Universelles Popup
    function notify(title, text, color = "var(--primary)") {
        const p = document.createElement('div');
        p.className = 'game-notification';
        p.style.borderColor = color;
        p.innerHTML = `<b style="color:${color}">${title}</b><br><small>${text}</small>`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 5000);
    }

    document.getElementById('main-nav').addEventListener('click', (e) => {
        const btn = e.target.closest('.nav-btn'); 
        if (!btn) return; 
        document.querySelectorAll('.view, .nav-btn').forEach(el => el.classList.remove('active'));
        const viewId = btn.getAttribute('data-view');
        document.getElementById(viewId).classList.add('active');
        btn.classList.add('active');
        if(viewId === 'view-shop') renderShop();
        if(viewId === 'view-achievements') renderAchs();
        if(viewId === 'view-leaderboard') loadLeads();
    });

    window.buyB = (id) => {
        if(cookies >= buildings[id].kosten) {
            cookies -= buildings[id].kosten; buildings[id].anzahl++;
            buildings[id].kosten = Math.floor(buildings[id].base * Math.pow(1.15, buildings[id].anzahl));
            updateUI(); renderShop();
        }
    };

    window.buyU = (id) => {
        if(cookies >= upgrades[id].kosten) {
            cookies -= upgrades[id].kosten; upgrades[id].anzahl++;
            upgrades[id].kosten = Math.floor(upgrades[id].base * Math.pow(2.8, upgrades[id].anzahl));
            updateUI(); renderShop();
        }
    };

    function renderShop() {
        document.getElementById('buildingsContainer').innerHTML = Object.entries(buildings).map(([id, b]) => `
            <div class="shop-item">
                <div style="font-size:2rem">${b.icon}</div>
                <div class="item-info"><b>${b.name} (${b.anzahl})</b><br><span class="item-price">${format(b.kosten)} 🍪</span></div>
                <button class="buy-btn" ${cookies < b.kosten ? 'disabled' : ''} onclick="buyB('${id}')">KAUFEN</button>
            </div>`).join('');
        document.getElementById('upgradesContainer').innerHTML = Object.entries(upgrades).map(([id, u]) => `
            <div class="shop-item" style="border-color: var(--accent)">
                <div style="font-size:2rem">${u.icon}</div>
                <div class="item-info"><b>${u.name} (Lvl ${u.anzahl})</b><br><span class="item-price">${format(u.kosten)} 🍪</span></div>
                <button class="buy-btn" style="background:var(--accent)" ${cookies < u.kosten ? 'disabled' : ''} onclick="buyU('${id}')">UPGRADE</button>
            </div>`).join('');
    }

    function renderAchs() {
        document.getElementById('ach-count-text').innerText = unlockedAchs.length + "/" + allAchs.length;
        document.getElementById('ach-bar-fill').style.width = (unlockedAchs.length/allAchs.length*100)+"%";
        document.getElementById('achievementsContainer').innerHTML = allAchs.map(a => `
            <div class="ach-card ${unlockedAchs.includes(a.id)?'unlocked':''}">
                <div style="font-size:1.5rem; margin-right:15px;">${unlockedAchs.includes(a.id)?'🏆':'🔒'}</div>
                <div><b>${a.title}</b><br><small>${a.desc}</small></div>
            </div>`).join('');
    }

    document.getElementById('cookie').onclick = (e) => {
        let cpc = 1;
        Object.values(upgrades).forEach(u => cpc += (u.anzahl * u.power));
        cookies += cpc; totalEver += cpc;
        const p = document.createElement('div'); p.className = 'particle'; p.innerText = "+"+format(cpc);
        p.style.left = e.clientX+'px'; p.style.top = e.clientY+'px';
        document.body.appendChild(p); setTimeout(() => p.remove(), 700);
        sounds.click.currentTime = 0; sounds.click.play().catch(()=>{});
        updateUI();
    };

    function updateUI() {
        let cps = Object.values(buildings).reduce((a,b) => a + (b.cps * b.anzahl), 0);
        let cpc = 1; Object.values(upgrades).forEach(u => cpc += (u.anzahl * u.power));
        document.getElementById('cookieCountDisplay').innerText = format(cookies);
        document.getElementById('cpsDisplay').innerText = format(cps);
        document.getElementById('cpcDisplay').innerText = format(cpc);
    }

    // LOGIN & OFFLINE LOGIK
    onAuthStateChanged(auth, async (user) => {
        if(user) {
            currentUser = user;
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists()) {
                const d = snap.data();
                cookies = d.cookies || 0; totalEver = d.totalEver || 0; unlockedAchs = d.unlockedAchs || [];
                Object.keys(buildings).forEach(k => { if(d.b && d.b[k]) buildings[k].anzahl = d.b[k]; buildings[k].kosten = Math.floor(buildings[k].base * Math.pow(1.15, buildings[k].anzahl)); });
                Object.keys(upgrades).forEach(k => { if(d.u && d.u[k]) upgrades[k].anzahl = d.u[k]; upgrades[k].kosten = Math.floor(upgrades[k].base * Math.pow(2.8, upgrades[k].anzahl)); });
                
                // Offline Gain Berechnung (5%)
                if(d.lastSave) {
                    const diff = Math.floor((Date.now() - d.lastSave) / 1000);
                    let cps = Object.values(buildings).reduce((a,b) => a + (b.cps * b.anzahl), 0);
                    const gain = (cps * 0.05) * diff;
                    if(gain > 1) {
                        cookies += gain; totalEver += gain;
                        notify("WILLKOMMEN ZURÜCK!", `Deine Betriebe haben offline ${format(gain)} Kekse generiert (5% Effizienz).`, "var(--success)");
                    }
                }

                document.getElementById('prof-name').innerText = d.username;
                document.getElementById('user-display-name').innerText = d.username.toUpperCase();
            }
            document.getElementById('auth-box').style.display='none'; 
            document.getElementById('profile-box').style.display='block';
            isLoading = false; updateUI();
        }
    });

    // TRANSFER LOGIK
    document.getElementById('traBtn').onclick = async () => {
        const targetName = document.getElementById('traName').value;
        const amount = parseFloat(document.getElementById('traAmt').value);
        if(!targetName || amount <= 0 || cookies < amount) return notify("FEHLER", "Ungültiger Betrag oder Name!", "var(--danger)");
        
        try {
            const q = query(collection(db, "users"), where("username", "==", targetName), limit(1));
            const snap = await getDocs(q);
            if(snap.empty) return notify("FEHLER", "Spieler nicht gefunden!", "var(--danger)");
            
            const targetId = snap.docs[0].id;
            cookies -= amount;
            await setDoc(doc(db, "users", targetId), { cookies: increment(amount) }, { merge: true });
            notify("TRANSFER ERFOLGREICH", `${format(amount)} Kekse an ${targetName} gesendet!`, "var(--accent)");
            updateUI();
        } catch(e) { notify("FEHLER", "Transfer fehlgeschlagen.", "var(--danger)"); }
    };

    document.getElementById('loginBtn').onclick = async () => {
        const n = document.getElementById('regName').value, e = document.getElementById('regEmail').value, p = document.getElementById('regPass').value;
        if(!n || !e || !p) return alert("Fehler: Bitte alle Felder ausfüllen!");
        try {
            const res = await signInWithEmailAndPassword(auth, e, p).catch(() => createUserWithEmailAndPassword(auth, e, p));
            await setDoc(doc(db, "users", res.user.uid), { username: n, cookies, totalEver, achCount: 0 }, { merge: true });
            location.reload();
        } catch(err) { alert(err.message); }
    };

    // GAME LOOP
    setInterval(() => {
        if(isLoading) return;
        let cps = Object.values(buildings).reduce((a,b) => a + (b.cps * b.anzahl), 0);
        cookies += cps/10; totalEver += cps/10; updateUI();
        
        allAchs.forEach(a => {
            if(!unlockedAchs.includes(a.id)) {
                let ach = false;
                if(a.type==='cookies' && totalEver >= a.target) ach = true;
                if(a.type==='building' && buildings[a.bid].anzahl >= a.target) ach = true;
                if(ach) {
                    unlockedAchs.push(a.id); 
                    notify("ERFOLG FREIGESCHALTET!", a.title, "var(--gold)");
                    sounds.ach.play().catch(()=>{});
                }
            }
        });

        if(Math.random() < 0.15) {
            const r = document.createElement('div'); r.className = 'rain-cookie'; r.innerText = '🍪';
            r.style.left = Math.random()*100+'vw'; r.style.animationDuration = '4s';
            document.getElementById('rain-container').appendChild(r); setTimeout(() => r.remove(), 4000);
        }
    }, 100);

    // AUTO SAVE
    setInterval(() => {
        if(currentUser && !isLoading) {
            const bS = {}, uS = {};
            Object.entries(buildings).forEach(([k,v])=>bS[k]=v.anzahl);
            Object.entries(upgrades).forEach(([k,v])=>uS[k]=v.anzahl);
            setDoc(doc(db, "users", currentUser.uid), { 
                cookies, totalEver, b: bS, u: uS, unlockedAchs, achCount: unlockedAchs.length, lastSave: Date.now()
            }, { merge: true });
        }
    }, 10000);

    async function loadLeads() {
        const q = query(collection(db, "users"), orderBy("cookies", "desc"), limit(15));
        const s = await getDocs(q);
        document.getElementById('leaderboardContainer').innerHTML = s.docs.map((d, i) => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; background:#151515; margin-bottom:8px; border-radius:12px; border-left: 4px solid ${i<3?'var(--gold)':'#333'}">
                <div>
                    <span style="font-weight:bold; color:${i<3?'var(--gold)':'#888'}">#${i+1}</span> 
                    <span style="margin-left:10px;">${d.data().username}</span><br>
                    <small style="color:var(--accent)">🏆 ${d.data().achCount || 0} Erfolge</small>
                </div>
                <b style="color:var(--primary);">${format(d.data().cookies)}</b>
            </div>`).join('');
    }
</script>
</body>
</html>
